<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لحظة واحده</title>
    <style>
        body { 
            background-color: #0d0d0d; /* لون الخلفية الأسود الداكن */
            color: #fff; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            font-family: sans-serif; 
        }
        #timer { 
            font-size: 100px; 
            color: #ff6600; /* اللون البرتقالي المميز */
            font-weight: bold; 
            margin-bottom: 20px; 
        }
        #message { 
            font-size: 24px; 
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div id="timer">10</div>
    <div id="message">لحظة واحدة من فضلك</div>

    <script>
        // استخراج الرابط الهدف من الرابط
        const urlParams = new URLSearchParams(window.location.search);
        const targetUrl = urlParams.get('target') || "https://www.google.com";

        let count = 10;
        const timerEl = document.getElementById('timer');
        const messageEl = document.getElementById('message');

        const interval = setInterval(() => {
            count--;
            
            if (count > 0) {
                timerEl.innerText = count;
            } else {
                // عند انتهاء العد
                timerEl.innerText = "تم التوجيه";
                messageEl.innerText = "لحظة واحدة من فضلك";
                clearInterval(interval);
                
                // التوجيه التلقائي
                window.location.replace(targetUrl);
            }
        }, 1000);
    </script>
</body>
</html>
